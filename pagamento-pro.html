<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url(style.css);
    </style>
</head>

<body class="payment-page">
    <div class="container-fluid fixed-top mt-4 d-flex justify-content-center" style="z-index: 9999;">
        <div class="navbar-custom border-highlight">
            <div class="nav-item">
                <a href="index.html" class="nav-link-custom">torna alla home</a>
            </div>
            <div class="nav-item logo-item">
                <a href="index.html" class="card">
                    <img src="logoScritta.png" class="img-base immagine_piccola">
                </a>
            </div>
        </div>
    </div>

    <div class="payment-hero">
        <div class="container">
            <div class="row min-vh-100 align-items-center pt-5">
                <div class="col-lg-6 mb-5">
                    <h1 class="payment-title">Completa il pagamento</h1>
                    <div class="summary-box highlighting">
                        <span class="plan-label">Piano scelto:</span>
                        <h2 class="plan-name-display">PRO</h2>
                        <div class="price-display">€49<span>/mese</span></div>
                    </div>

                    <div class="method-icons mt-4">
                        <img src="https://img.icons8.com/color/48/000000/visa.png" alt="Visa">
                        <img src="https://img.icons8.com/color/48/000000/mastercard.png" alt="Mastercard">
                        <img src="https://img.icons8.com/color/48/000000/amex.png" alt="Amex">
                        <img src="https://img.icons8.com/color/48/000000/paypal.png" alt="PayPal">
                        <img src="https://img.icons8.com/color/48/000000/apple-pay.png" alt="Apple Pay">
                        <img src="https://img.icons8.com/color/48/000000/google-pay.png" alt="Google Pay">
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="payment-container">
                        <div class="credit-card-container mb-4">
                            <div class="credit-card purple-gradient" id="cardMockup">
                                <div class="card-front">
                                    <div class="card-chip"></div>
                                    <div class="card-logo">
                                        <img src="https://img.icons8.com/color/48/ffffff/visa.png" id="cardBrandIcon"
                                            alt="Visa">
                                    </div>
                                    <div class="card-number" id="cardNumDisplay">1234 •••• •••• 5678</div>
                                    <div class="card-details">
                                        <div class="detail-item">
                                            <div class="detail-label">intestatario</div>
                                            <div class="detail-value" id="cardNameDisplay">NOME COGNOME</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">scadenza</div>
                                            <div class="detail-value" id="cardExpiryDisplay">MM/AA</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <form class="payment-form" id="paymentForm">
                            <div class="mb-3">
                                <label class="form-label">Nome Intestatario</label>
                                <input type="text" class="form-control" id="cardNameInput" placeholder="NOME COGNOME"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Numero Carta</label>
                                <input type="text" class="form-control" id="cardNumInput" maxlength="19"
                                    placeholder="1234 5678 1234 5678" required>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Scadenza</label>
                                    <input type="text" class="form-control" id="cardExpiryInput" maxlength="5"
                                        placeholder="MM/AA" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">CVV</label>
                                    <input type="text" class="form-control" id="cardCvvInput" maxlength="3"
                                        placeholder="123" required>
                                </div>
                            </div>
                            <button type="submit" class="btn-pay-now highlighting mt-4 w-100">Paga ora</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pulsante Accessibilità rapido (Top Left) -->
    <div class="accessibility-fab left-side" id="accFab" title="Accessibilità">
        <div class="wheelchair-icon">
            <div class="wheelchair-head"></div>
            <div class="wheelchair-body"></div>
            <div class="wheelchair-wheel"></div>
        </div>
    </div>

    <!-- Pannello Accessibilità Rapido -->
    <div id="accPanel" class="acc-panel left-side">
        <span class="close-acc" id="closeAcc">&times;</span>
        <h3 class="impact-text">Accessibilità</h3>
        <button onclick="toggleHighContrast()">Inverti Colori (WCAG)</button>
        <button onclick="toggleDyslexicFont()">Font Leggibile (Dyslexic)</button>
        <button onclick="readAloud()">Leggi Contenuto (Audio)</button>
        <button onclick="changeFontSize(1.2)">Ingrandisci Caratteri</button>
        <button onclick="changeFontSize(1)">Dimensioni Standard</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
